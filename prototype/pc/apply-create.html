<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建申请 - 西藏电信仓库管理系统</title>
    <link rel="stylesheet" href="../assets/css/pc-common.css">
    <link rel="stylesheet" href="../assets/css/sidebar-fix.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">📦</div><div class="sidebar-title">仓库管理系统</div>
                <div class="sidebar-toggle" onclick="toggleSidebar()">◀</div></div>
            <nav class="sidebar-menu">
                <div class="menu-item" onclick="location.href='dashboard.html'"><span class="menu-item-icon">🏠</span><span>工作台</span></div>
                <div class="menu-item active" data-title="工作台"><span class="menu-item-icon">📝</span><span>我的申请</span></div>
                <div class="menu-item" data-title="库存查询" onclick="location.href='inventory-list.html'"><span class="menu-item-icon">📊</span><span>库存查询</span></div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <span class="breadcrumb-item" style="cursor: pointer;" onclick="location.href='apply-list.html'">我的申请</span>
                        <span>/</span>
                        <span class="breadcrumb-item active">新建申请</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="notification-btn"><span>🔔</span><span class="notification-badge">1</span></div>
                    <div class="user-info"><div class="user-avatar">李</div><span>李明</span></div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="card">
                    <div class="card-header"><div class="card-title">新建物资申请</div></div>

                    <form id="applyForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label required">申请用途</label>
                                <input type="text" class="form-input" id="purpose" placeholder="请详细说明申请物资的用途" required>
                            </div>
                        </div>

                        <div style="margin-bottom: 24px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                <label class="form-label required" style="margin: 0;">申请明细</label>
                                <div>
                                    <button type="button" class="btn btn-default" onclick="location.href='inventory-list.html'" style="margin-right: 8px;">查看库存</button>
                                    <button type="button" class="btn btn-primary" onclick="addMaterialRow()">+ 添加物资</button>
                                </div>
                            </div>

                            <table id="materialTable" style="width: 100%;">
                                <thead>
                                    <tr>
                                        <th width="18%">物资</th>
                                        <th width="22%">规格型号</th>
                                        <th width="8%">单位</th>
                                        <th width="10%">当前库存</th>
                                        <th width="10%">申请数量</th>
                                        <th width="10%">单价</th>
                                        <th width="12%">金额</th>
                                        <th width="10%">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="materialTableBody"></tbody>
                                <tfoot>
                                    <tr style="background: #fafafa; font-weight: 500;">
                                        <td colspan="6" style="text-align: right; padding-right: 16px;">合计：</td>
                                        <td id="totalAmount" class="text-danger">¥0.00</td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <div style="padding: 16px; background: #e6f7ff; border-radius: 8px; margin-bottom: 24px;">
                            <div style="font-size: 14px; color: #1890ff; margin-bottom: 8px;">💡 温馨提示</div>
                            <ul style="font-size: 13px; color: #595959; margin: 0; padding-left: 24px; line-height: 1.8;">
                                <li>请根据实际需求填写物资申请，避免浪费</li>
                                <li>申请数量超过库存时，审批时间可能会延长</li>
                                <li>申请提交后，将由仓库管理员审批</li>
                                <li>审批通过后，请在7天内领取物资，否则将自动取消</li>
                            </ul>
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 12px;">
                            <button type="button" class="btn btn-default" onclick="location.href='apply-list.html'">取消</button>
                            <button type="submit" class="btn btn-primary">提交申请</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/mock-data.js"></script>
    <script src="../assets/js/common.js"></script>
    <script>
        let materialRows = [];

        function addMaterialRow() {
            const rowId = generateId();
            materialRows.push(rowId);
            const tbody = document.getElementById('materialTableBody');
            const tr = document.createElement('tr');
            tr.id = rowId;
            tr.innerHTML = `
                <td>
                    <select class="form-select" onchange="handleMaterialChange('${rowId}')" required>
                        <option value="">请选择物资</option>
                        ${mockData.materials.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
                    </select>
                </td>
                <td><input type="text" class="form-input" readonly></td>
                <td><input type="text" class="form-input" readonly></td>
                <td><span class="stock-quantity">-</span></td>
                <td><input type="number" class="form-input" min="1" value="1" onchange="calculateRowAmount('${rowId}')" required></td>
                <td><input type="number" class="form-input" step="0.01" min="0" readonly></td>
                <td class="row-amount">¥0.00</td>
                <td><button type="button" class="btn btn-text text-danger" onclick="removeMaterialRow('${rowId}')">删除</button></td>
            `;
            tbody.appendChild(tr);
        }

        function removeMaterialRow(rowId) {
            const index = materialRows.indexOf(rowId);
            if (index > -1) materialRows.splice(index, 1);
            document.getElementById(rowId).remove();
            calculateTotalAmount();
        }

        function handleMaterialChange(rowId) {
            const row = document.getElementById(rowId);
            const materialSelect = row.querySelector('select');
            const materialId = parseInt(materialSelect.value);
            if (!materialId) return;

            const material = mockData.materials.find(m => m.id === materialId);
            const inventory = mockData.inventoryList.find(i => i.materialId === materialId);
            if (!material) return;

            const inputs = row.querySelectorAll('input');
            inputs[0].value = material.spec;
            inputs[1].value = material.unit;
            inputs[3].value = material.price;

            const stockSpan = row.querySelector('.stock-quantity');
            if (inventory) {
                const stockText = `${inventory.quantity}${material.unit}`;
                const stockClass = inventory.status === 1 ? 'text-success' : (inventory.status === 2 ? 'text-warning' : 'text-danger');
                stockSpan.innerHTML = `<span class="${stockClass}">${stockText}</span>`;
            } else {
                stockSpan.innerHTML = '<span class="text-danger">无库存</span>';
            }

            calculateRowAmount(rowId);
        }

        function calculateRowAmount(rowId) {
            const row = document.getElementById(rowId);
            const inputs = row.querySelectorAll('input');
            const quantity = parseFloat(inputs[2].value) || 0;
            const price = parseFloat(inputs[3].value) || 0;
            row.querySelector('.row-amount').textContent = formatMoney(quantity * price);
            calculateTotalAmount();
        }

        function calculateTotalAmount() {
            let total = 0;
            materialRows.forEach(rowId => {
                const row = document.getElementById(rowId);
                if (!row) return;
                const inputs = row.querySelectorAll('input');
                total += (parseFloat(inputs[2].value) || 0) * (parseFloat(inputs[3].value) || 0);
            });
            document.getElementById('totalAmount').textContent = formatMoney(total);
        }

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const purpose = document.getElementById('purpose').value.trim();
            if (!purpose) {
                Message.warning('请填写申请用途');
                return;
            }

            if (materialRows.length === 0) {
                Message.warning('请至少添加一条申请明细');
                return;
            }

            // 验证所有明细是否填写完整
            let valid = true;
            let hasStockWarning = false;
            materialRows.forEach(rowId => {
                const row = document.getElementById(rowId);
                const select = row.querySelector('select');
                const inputs = row.querySelectorAll('input');

                if (!select.value || !inputs[2].value || !inputs[3].value) {
                    valid = false;
                }

                // 检查库存
                const materialId = parseInt(select.value);
                const quantity = parseInt(inputs[2].value);
                const inventory = mockData.inventoryList.find(i => i.materialId === materialId);
                if (inventory && quantity > inventory.quantity) {
                    hasStockWarning = true;
                }
            });

            if (!valid) {
                Message.warning('请完整填写所有申请明细');
                return;
            }

            if (hasStockWarning) {
                confirm(
                    '库存提醒',
                    '您申请的部分物资数量超过当前库存，可能会延长审批时间，是否继续提交？',
                    submitApply
                );
            } else {
                submitApply();
            }
        });

        function submitApply() {
            Loading.show('正在提交...');
            setTimeout(() => {
                Loading.hide();
                Message.success('申请提交成功，请等待审批');
                setTimeout(() => {
                    location.href = 'apply-list.html';
                }, 1500);
            }, 1000);
        }

        function init() {
            addMaterialRow();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="../assets/js/sidebar.js"></script>
</body>
</html>
